name: BuzzCart Backend Deploy

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'projects/buzzcart/backend/**'
      - '.github/workflows/buzzcart-backend-deploy.yml'
  push:
    branches:
      - main
    paths:
      - 'projects/buzzcart/backend/**'
      - '.github/workflows/buzzcart-backend-deploy.yml'

permissions:
  contents: read
  id-token: write

concurrency:
  group: buzzcart-backend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: buzzcart-daeb6
  GCP_REGION: us-east4
  CLOUD_RUN_SERVICE: buzzcart-backend
  CLOUD_SQL_INSTANCE: buzzcart-daeb6:us-east4:buzzcart-daeb6-instance
  CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: all-permissions@buzzcart-daeb6.iam.gserviceaccount.com

jobs:
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/buzzcart/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: projects/buzzcart/backend/go.mod

      - name: Build
        run: go build ./...

  deploy:
    needs: backend-build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Google auth configuration
        id: auth-config
        shell: bash
        env:
          BUZZCART_GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.BUZZCART_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          BUZZCART_GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.BUZZCART_GCP_SERVICE_ACCOUNT_EMAIL }}
          BUZZCART_GCP_CREDENTIALS_JSON: ${{ secrets.BUZZCART_GCP_CREDENTIALS_JSON }}
        run: |
          if [[ -n "$BUZZCART_GCP_CREDENTIALS_JSON" ]]; then
            if [[ -n "$BUZZCART_GCP_WORKLOAD_IDENTITY_PROVIDER" || -n "$BUZZCART_GCP_SERVICE_ACCOUNT_EMAIL" ]]; then
              echo "::error::Configure either BUZZCART_GCP_CREDENTIALS_JSON or the BuzzCart workload identity pair, not both."
              exit 1
            fi
            echo "mode=credentials_json" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "$BUZZCART_GCP_WORKLOAD_IDENTITY_PROVIDER" || -n "$BUZZCART_GCP_SERVICE_ACCOUNT_EMAIL" ]]; then
            if [[ -z "$BUZZCART_GCP_WORKLOAD_IDENTITY_PROVIDER" || -z "$BUZZCART_GCP_SERVICE_ACCOUNT_EMAIL" ]]; then
              echo "::error::Both BUZZCART_GCP_WORKLOAD_IDENTITY_PROVIDER and BUZZCART_GCP_SERVICE_ACCOUNT_EMAIL must be set for workload identity auth."
              exit 1
            fi
            echo "mode=workload_identity" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Configure BUZZCART_GCP_CREDENTIALS_JSON or the BuzzCart workload identity secrets. Do not use the shared NexAlgo GCP_* secrets for BuzzCart deploys."
          exit 1

      - name: Authenticate to Google Cloud with Workload Identity
        if: ${{ steps.auth-config.outputs.mode == 'workload_identity' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.BUZZCART_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.BUZZCART_GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud with service account JSON
        if: ${{ steps.auth-config.outputs.mode == 'credentials_json' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.BUZZCART_GCP_CREDENTIALS_JSON }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Verify deploy identity
        shell: bash
        run: |
          ACTIVE_ACCOUNT="$(gcloud auth list --filter=status:ACTIVE --format='value(account)')"
          ACTIVE_PROJECT="$(gcloud config get-value project)"
          echo "Deploy account: $ACTIVE_ACCOUNT"
          echo "Deploy project: $ACTIVE_PROJECT"

          if [[ "$ACTIVE_PROJECT" != "$GCP_PROJECT_ID" ]]; then
            echo "::error::gcloud is configured for '$ACTIVE_PROJECT', expected '$GCP_PROJECT_ID'."
            exit 1
          fi

          if [[ "$ACTIVE_ACCOUNT" == *"nexalgo-ace83"* ]]; then
            echo "::error::BuzzCart deploy is authenticated as the NexAlgo service account. Configure BUZZCART_GCP_* GitHub secrets for project $GCP_PROJECT_ID."
            exit 1
          fi

      - name: Write Cloud Run env file
        shell: bash
        env:
          BUZZCART_DATABASE_URL: ${{ secrets.BUZZCART_DATABASE_URL }}
          BUZZCART_JWT_SECRET: ${{ secrets.BUZZCART_JWT_SECRET }}
          BUZZCART_REDIS_URL: ${{ secrets.BUZZCART_REDIS_URL }}
          BUZZCART_ALLOWED_FRONTEND_ORIGINS: ${{ vars.BUZZCART_ALLOWED_FRONTEND_ORIGINS }}
        run: |
          missing=()
          [[ -z "$BUZZCART_DATABASE_URL" ]] && missing+=("BUZZCART_DATABASE_URL")
          [[ -z "$BUZZCART_JWT_SECRET" ]] && missing+=("BUZZCART_JWT_SECRET")
          [[ -z "$BUZZCART_ALLOWED_FRONTEND_ORIGINS" ]] && missing+=("BUZZCART_ALLOWED_FRONTEND_ORIGINS")

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required BuzzCart deploy secrets/vars: ${missing[*]}"
            exit 1
          fi

          cat <<EOF > "$RUNNER_TEMP/buzzcart-cloudrun-env.yaml"
          DATABASE_URL: "${BUZZCART_DATABASE_URL}"
          JWT_SECRET: "${BUZZCART_JWT_SECRET}"
          REDIS_URL: "${BUZZCART_REDIS_URL}"
          ALLOWED_FRONTEND_ORIGINS: "${BUZZCART_ALLOWED_FRONTEND_ORIGINS}"
          FIREBASE_PROJECT_ID: "buzzcart-daeb6"
          FIREBASE_STORAGE_BUCKET: "gs://buzzcart-daeb6.firebasestorage.app"
          FIREBASE_STORAGE_LOCATION: "us-east1"
          FIREBASE_STORAGE_PUBLIC_BASE_URL: "https://firebasestorage.googleapis.com/v0/b"
          EOF

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --source projects/buzzcart/backend \
            --allow-unauthenticated \
            --service-account "$CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT" \
            --add-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --env-vars-file "$RUNNER_TEMP/buzzcart-cloudrun-env.yaml"

      - name: Print Cloud Run logs on deploy failure
        if: ${{ failure() }}
        shell: bash
        run: |
          gcloud logging read \
            "resource.type=\"cloud_run_revision\" AND resource.labels.service_name=\"$CLOUD_RUN_SERVICE\"" \
            --project "$GCP_PROJECT_ID" \
            --limit 80 \
            --format "value(timestamp,severity,textPayload,jsonPayload.message)" || true

      - name: Fetch deployed service URL
        id: service-url
        shell: bash
        run: |
          SERVICE_URL="$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)')"
          echo "url=$SERVICE_URL" >> "$GITHUB_OUTPUT"

      - name: Verify health endpoint
        shell: bash
        run: |
          curl --fail --show-error --silent "${{ steps.service-url.outputs.url }}/health"
