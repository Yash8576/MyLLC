name: BuzzCart Backend Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'projects/buzzcart/backend/**'
      - '.github/workflows/buzzcart-backend-deploy.yml'

permissions:
  contents: read
  id-token: write

concurrency:
  group: buzzcart-backend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: buzzcart-daeb6
  GCP_REGION: us-east4
  CLOUD_RUN_SERVICE: buzzcart-backend
  CLOUD_SQL_INSTANCE: buzzcart-daeb6:us-east4:buzzcart-daeb6-instance

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/buzzcart/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: projects/buzzcart/backend/go.mod

      - name: Run Go tests
        run: go test ./...

  deploy:
    needs: backend-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Google auth configuration
        id: auth-config
        shell: bash
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        run: |
          if [[ -n "$GCP_CREDENTIALS_JSON" ]]; then
            if [[ -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" || -n "$GCP_SERVICE_ACCOUNT_EMAIL" ]]; then
              echo "::error::Configure either GCP_CREDENTIALS_JSON or the workload identity pair, not both."
              exit 1
            fi
            echo "mode=credentials_json" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" || -n "$GCP_SERVICE_ACCOUNT_EMAIL" ]]; then
            if [[ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" || -z "$GCP_SERVICE_ACCOUNT_EMAIL" ]]; then
              echo "::error::Both GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT_EMAIL must be set for workload identity auth."
              exit 1
            fi
            echo "mode=workload_identity" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::Skipping BuzzCart backend deploy because no Google Cloud auth secrets are configured."
          echo "mode=skip" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud with Workload Identity
        if: ${{ steps.auth-config.outputs.mode == 'workload_identity' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud with service account JSON
        if: ${{ steps.auth-config.outputs.mode == 'credentials_json' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Setup gcloud
        if: ${{ steps.auth-config.outputs.mode != 'skip' }}
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Write Cloud Run env file
        if: ${{ steps.auth-config.outputs.mode != 'skip' }}
        shell: bash
        run: |
          cat <<EOF > "$RUNNER_TEMP/buzzcart-cloudrun-env.yaml"
          DATABASE_URL: "${{ secrets.BUZZCART_DATABASE_URL }}"
          JWT_SECRET: "${{ secrets.BUZZCART_JWT_SECRET }}"
          REDIS_URL: "${{ secrets.BUZZCART_REDIS_URL }}"
          ALLOWED_FRONTEND_ORIGINS: "${{ vars.BUZZCART_ALLOWED_FRONTEND_ORIGINS }}"
          FIREBASE_PROJECT_ID: "buzzcart-daeb6"
          FIREBASE_STORAGE_BUCKET: "gs://buzzcart-daeb6.firebasestorage.app"
          FIREBASE_STORAGE_LOCATION: "us-east1"
          FIREBASE_STORAGE_PUBLIC_BASE_URL: "https://firebasestorage.googleapis.com/v0/b"
          EOF

      - name: Deploy backend to Cloud Run
        if: ${{ steps.auth-config.outputs.mode != 'skip' }}
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --source projects/buzzcart/backend \
            --allow-unauthenticated \
            --add-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --env-vars-file "$RUNNER_TEMP/buzzcart-cloudrun-env.yaml"

      - name: Fetch deployed service URL
        if: ${{ steps.auth-config.outputs.mode != 'skip' }}
        id: service-url
        shell: bash
        run: |
          SERVICE_URL="$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)')"
          echo "url=$SERVICE_URL" >> "$GITHUB_OUTPUT"

      - name: Verify health endpoint
        if: ${{ steps.auth-config.outputs.mode != 'skip' }}
        shell: bash
        run: |
          curl --fail --show-error --silent "${{ steps.service-url.outputs.url }}/health"

      - name: Report skipped deploy
        if: ${{ steps.auth-config.outputs.mode == 'skip' }}
        run: |
          echo "BuzzCart backend deploy skipped because no Google Cloud auth secrets are configured."
