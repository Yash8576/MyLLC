name: NexAlgo Backend Deploy

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'projects/nexalgo/backend/**'
      - '.github/workflows/nexalgo-backend-deploy.yml'
  push:
    branches:
      - main
    paths:
      - 'projects/nexalgo/backend/**'
      - '.github/workflows/nexalgo-backend-deploy.yml'

permissions:
  contents: read
  id-token: write

concurrency:
  group: nexalgo-backend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: nexalgo-mig01
  GCP_REGION: us-east4
  CLOUD_RUN_SERVICE: nexalgo-backend
  CLOUD_SQL_INSTANCE: nexalgo-mig01:us-east4:nexalgo-mig01-instance

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/nexalgo/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: projects/nexalgo/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npm run build

  deploy:
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Google auth configuration
        id: auth-config
        shell: bash
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        run: |
          if [[ -n "$GCP_CREDENTIALS_JSON" ]]; then
            echo "mode=credentials_json" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" && -n "$GCP_SERVICE_ACCOUNT_EMAIL" ]]; then
            echo "mode=workload_identity" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Configure GCP_CREDENTIALS_JSON or the workload identity secrets."
          exit 1

      - name: Authenticate to Google Cloud with Workload Identity
        if: ${{ steps.auth-config.outputs.mode == 'workload_identity' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud with service account JSON
        if: ${{ steps.auth-config.outputs.mode == 'credentials_json' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Write Cloud Run env file
        shell: bash
        env:
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
          NEXALGO_DATABASE_URL: ${{ secrets.NEXALGO_DATABASE_URL }}
          NEXALGO_FIREBASE_CLIENT_EMAIL: ${{ secrets.NEXALGO_FIREBASE_CLIENT_EMAIL }}
          NEXALGO_FIREBASE_PRIVATE_KEY: ${{ secrets.NEXALGO_FIREBASE_PRIVATE_KEY }}
          NEXALGO_OPENAI_API_KEY: ${{ secrets.NEXALGO_OPENAI_API_KEY }}
          NEXALGO_INITIAL_ADMIN_EMAIL: ${{ vars.NEXALGO_INITIAL_ADMIN_EMAIL }}
        run: |
          FIREBASE_CLIENT_EMAIL="${NEXALGO_FIREBASE_CLIENT_EMAIL}"
          FIREBASE_PRIVATE_KEY="${NEXALGO_FIREBASE_PRIVATE_KEY}"

          if [[ -z "$FIREBASE_CLIENT_EMAIL" || -z "$FIREBASE_PRIVATE_KEY" ]]; then
            FIREBASE_CLIENT_EMAIL="$(node -e 'const key = JSON.parse(process.env.GCP_CREDENTIALS_JSON); process.stdout.write(key.client_email || "")')"
            FIREBASE_PRIVATE_KEY="$(node -e 'const key = JSON.parse(process.env.GCP_CREDENTIALS_JSON); process.stdout.write(key.private_key || "")')"
          fi

          FIREBASE_PRIVATE_KEY="$(FIREBASE_PRIVATE_KEY="$FIREBASE_PRIVATE_KEY" node -e 'process.stdout.write((process.env.FIREBASE_PRIVATE_KEY || "").replace(/\r?\n/g, "\\n"))')"

          if [[ -z "$FIREBASE_CLIENT_EMAIL" || -z "$FIREBASE_PRIVATE_KEY" ]]; then
            echo "::error::Configure NEXALGO_FIREBASE_CLIENT_EMAIL and NEXALGO_FIREBASE_PRIVATE_KEY, or provide a GCP_CREDENTIALS_JSON service account key with client_email/private_key."
            exit 1
          fi

          if [[ -z "$NEXALGO_DATABASE_URL" ]]; then
            echo "::error::Configure NEXALGO_DATABASE_URL."
            exit 1
          fi

          NEXALGO_DATABASE_URL="$(DATABASE_URL="$NEXALGO_DATABASE_URL" node <<'EOF'
          const raw = process.env.DATABASE_URL || ''
          const match = raw.match(/^(postgres(?:ql)?:\/\/[^:]+:)(.*)(@(?:localhost)?\/.*)$/)

          if (!match) {
            process.stdout.write(raw)
            process.exit(0)
          }

          const password = match[2]
          const encodedPassword = /%[0-9A-Fa-f]{2}/.test(password)
            ? password
            : encodeURIComponent(password)

          process.stdout.write(`${match[1]}${encodedPassword}${match[3]}`)
          EOF
          )"

          if [[ -n "$NEXALGO_INITIAL_ADMIN_EMAIL" ]]; then
            NEXALGO_INITIAL_ADMIN_EMAIL="$(ADMIN_EMAIL="$NEXALGO_INITIAL_ADMIN_EMAIL" node <<'EOF'
          const value = process.env.ADMIN_EMAIL || ''
          const match = value.match(/[^\s@"'`<>]+@[^\s@"'`<>]+\.[^\s@"'`<>]+/)

          if (!match) {
            console.error('NEXALGO_INITIAL_ADMIN_EMAIL must contain a valid email if set.')
            process.exit(1)
          }

          process.stdout.write(match[0].toLowerCase())
          EOF
          )"
          fi

          FIREBASE_CLIENT_EMAIL="$FIREBASE_CLIENT_EMAIL" FIREBASE_PRIVATE_KEY="$FIREBASE_PRIVATE_KEY" node <<'EOF'
          const { createPrivateKey } = require('node:crypto')
          const email = process.env.FIREBASE_CLIENT_EMAIL || ''
          const privateKey = (process.env.FIREBASE_PRIVATE_KEY || '').replace(/\\n/g, '\n')

          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            console.error('FIREBASE_CLIENT_EMAIL must be a valid email.')
            process.exit(1)
          }

          try {
            createPrivateKey(privateKey)
          } catch {
            console.error('FIREBASE_PRIVATE_KEY is not a valid PEM private key.')
            process.exit(1)
          }
          EOF

          {
            cat <<EOF
          NODE_ENV: "production"
          CORS_ORIGIN: "https://nexacoreglobal.org,http://localhost:3000"
          DATABASE_URL: "${NEXALGO_DATABASE_URL}"
          FIREBASE_PROJECT_ID: "nexalgo-mig01"
          FIREBASE_CLIENT_EMAIL: "${FIREBASE_CLIENT_EMAIL}"
          FIREBASE_PRIVATE_KEY: "${FIREBASE_PRIVATE_KEY}"
          OPENAI_API_KEY: "${NEXALGO_OPENAI_API_KEY}"
          OPENAI_MODEL: "gpt-5-mini"
          EOF
            if [[ -n "$NEXALGO_INITIAL_ADMIN_EMAIL" ]]; then
              printf 'NEXALGO_INITIAL_ADMIN_EMAIL: "%s"\n' "$NEXALGO_INITIAL_ADMIN_EMAIL"
            fi
          } > "$RUNNER_TEMP/nexalgo-cloudrun-env.yaml"

      - name: Deploy backend to Cloud Run
        shell: bash
        run: |
          args=(
            run deploy "$CLOUD_RUN_SERVICE"
            --project "$GCP_PROJECT_ID"
            --region "$GCP_REGION"
            --source projects/nexalgo/backend
            --allow-unauthenticated
            --env-vars-file "$RUNNER_TEMP/nexalgo-cloudrun-env.yaml"
          )

          if [[ -n "$CLOUD_SQL_INSTANCE" ]]; then
            args+=(--add-cloudsql-instances "$CLOUD_SQL_INSTANCE")
          fi

          gcloud "${args[@]}"

      - name: Verify health endpoint
        shell: bash
        run: |
          SERVICE_URL="$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)')"
          curl --fail --show-error --silent "$SERVICE_URL/health"
          curl --fail --show-error --silent \
            --header "Origin: https://nexacoreglobal.org" \
            "$SERVICE_URL/v1/problems" > /dev/null
          echo "NexAlgo backend URL: $SERVICE_URL"
