name: Nanolink Frontend Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'projects/nanolink/frontend/**'
      - '.github/workflows/nanolink-frontend-build.yml'
  push:
    branches:
      - main
    paths:
      - 'projects/nanolink/frontend/**'
      - '.github/workflows/nanolink-frontend-build.yml'

permissions:
  contents: read

concurrency:
  group: nanolink-frontend-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Nanolink frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/nanolink/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
