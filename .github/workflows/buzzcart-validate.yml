name: BuzzCart Frontend Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'projects/buzzcart/frontend/**'
      - '.github/workflows/buzzcart-validate.yml'
  push:
    branches:
      - main
    paths:
      - 'projects/buzzcart/frontend/**'
      - '.github/workflows/buzzcart-validate.yml'

permissions:
  contents: read

concurrency:
  group: buzzcart-frontend-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: BuzzCart frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/buzzcart/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /nexacore/BuzzCart/
