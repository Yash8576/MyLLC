name: BuzzCart Validate

on:
  workflow_dispatch:

jobs:
  frontend-build:
    name: BuzzCart frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/buzzcart/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /nexacore/BuzzCart/
