<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .boxTitle { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .boxText { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .frontend { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .backend { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .service { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; }
      .data { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .infra { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>
  <text class="title" x="700" y="55" text-anchor="middle">BuzzCart High-Level Architecture</text>
  <text class="subtitle" x="700" y="82" text-anchor="middle">Flutter frontend + Go backend + Python RAG service + PostgreSQL + Firebase Storage + Redis</text>

  <rect class="frontend" x="70" y="160" rx="24" ry="24" width="250" height="210"/>
  <text class="boxTitle" x="195" y="205" text-anchor="middle">Flutter Frontend</text>
  <text class="boxText" x="100" y="245">• Authentication screens</text>
  <text class="boxText" x="100" y="273">• Home / Shop / Reels / Videos</text>
  <text class="boxText" x="100" y="301">• Reviews and buyer views</text>
  <text class="boxText" x="100" y="329">• Cart and checkout</text>

  <rect class="backend" x="450" y="130" rx="24" ry="24" width="320" height="270"/>
  <text class="boxTitle" x="610" y="175" text-anchor="middle">Go Backend API</text>
  <text class="boxText" x="485" y="215">• Auth / users / follow</text>
  <text class="boxText" x="485" y="243">• Products / uploads / search</text>
  <text class="boxText" x="485" y="271">• Reviews / buyers / moderation</text>
  <text class="boxText" x="485" y="299">• Cart / checkout / purchases</text>
  <text class="boxText" x="485" y="327">• Feed / posts / videos / reels</text>
  <text class="boxText" x="485" y="355">• Messaging + WebSocket</text>

  <rect class="service" x="930" y="160" rx="24" ry="24" width="310" height="240"/>
  <text class="boxTitle" x="1085" y="205" text-anchor="middle">Python RAG Service</text>
  <text class="boxText" x="965" y="245">• Product document sync/upload</text>
  <text class="boxText" x="965" y="273">• PDF extraction and chunking</text>
  <text class="boxText" x="965" y="301">• Embeddings + FAISS index</text>
  <text class="boxText" x="965" y="329">• Retrieval + reranking</text>
  <text class="boxText" x="965" y="357">• Grounded question answering</text>

  <rect class="data" x="380" y="560" rx="24" ry="24" width="240" height="150"/>
  <text class="boxTitle" x="500" y="605" text-anchor="middle">PostgreSQL</text>
  <text class="boxText" x="415" y="645">Users, products, orders,</text>
  <text class="boxText" x="415" y="673">reviews, posts, messages</text>

  <rect class="data" x="680" y="560" rx="24" ry="24" width="190" height="150"/>
  <text class="boxTitle" x="775" y="605" text-anchor="middle">Redis</text>
  <text class="boxText" x="712" y="645">Review ranking cache</text>
  <text class="boxText" x="712" y="673">Short-lived reads</text>

  <rect class="infra" x="930" y="545" rx="24" ry="24" width="280" height="180"/>
  <text class="boxTitle" x="1070" y="590" text-anchor="middle">Firebase Storage</text>
  <text class="boxText" x="965" y="630">• Product images</text>
  <text class="boxText" x="965" y="658">• User avatars</text>
  <text class="boxText" x="965" y="686">• Uploaded videos/media</text>
  <text class="boxText" x="965" y="714">• Product documents</text>

  <path class="arrow" d="M320 265 L450 265"/>
  <text class="small" x="385" y="248" text-anchor="middle">REST API</text>

  <path class="arrow" d="M770 265 L930 265"/>
  <text class="small" x="850" y="248" text-anchor="middle">Chat requests / document sync</text>

  <path class="arrow dashed" d="M610 400 L610 560"/>
  <text class="small" x="626" y="492">Transactional data</text>

  <path class="arrow dashed" d="M700 400 L760 560"/>
  <text class="small" x="742" y="500">Cache</text>

  <path class="arrow dashed" d="M1010 400 L1040 545"/>
  <text class="small" x="1045" y="485">Document fetch</text>

  <path class="arrow dashed" d="M760 330 L930 595"/>
  <text class="small" x="855" y="470">Media/document URLs</text>

  <path class="arrow dashed" d="M930 625 L620 625"/>
  <text class="small" x="790" y="610">Product/order context</text>

  <path class="arrow" d="M195 370 L195 470 L610 470 L610 400"/>
  <text class="small" x="350" y="455">Feed, shop, reviews, cart, messaging</text>

  <rect x="70" y="760" width="1260" height="90" rx="18" ry="18" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text class="boxText" x="700" y="798" text-anchor="middle">Core project value: trusted reviews from known people + document-grounded product understanding</text>
  <text class="small" x="700" y="827" text-anchor="middle">Known-people review ranking is enforced in the Go backend, while product understanding is powered by the Python RAG service over seller-uploaded documents.</text>
</svg>
