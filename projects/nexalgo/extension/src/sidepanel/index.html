<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexAlgo</title>
    <style>
      :root {
        --nx-bg: #15171a;
        --nx-panel: #1c1f23;
        --nx-panel-2: #23272c;
        --nx-line: #2e333a;
        --nx-line-soft: #262b31;
        --nx-ink: #e7eaed;
        --nx-ink-dim: #9aa3ad;
        --nx-ink-faint: #6b747e;
        --nx-signal: #6556ff;
        --nx-signal-dim: #4338b0;
        --nx-easy: #3fb37f;
        --nx-med: #d9a23a;
        --nx-hard: #e3625b;
        --nx-code-bg: #101316;
        --nx-mono: "SFMono-Regular", ui-monospace, "JetBrains Mono", "Cascadia Code", Consolas, monospace;
        --nx-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--nx-sans);
        font-size: 13px;
        background: var(--nx-bg);
        color: var(--nx-ink);
      }

      .shell {
        min-height: 100vh;
        background: var(--nx-bg);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 1;
        padding: 14px 16px;
        border-bottom: 1px solid var(--nx-line);
        background: var(--nx-panel);
      }

      h1 {
        margin: 0;
        font-family: var(--nx-mono);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--nx-ink);
      }

      h1::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        background: var(--nx-signal);
        margin-right: 7px;
        vertical-align: middle;
      }

      #status {
        margin: 6px 0 0;
        font-family: var(--nx-mono);
        font-size: 10.5px;
        letter-spacing: 0.04em;
        color: var(--nx-ink-faint);
      }

      .panel {
        padding: 14px;
      }

      section {
        margin: 0 0 14px;
      }

      #content > section:not(.hero) {
        border: 1px solid var(--nx-line);
        padding: 12px 13px;
        background: var(--nx-panel);
      }

      .hero {
        margin: -14px -14px 14px;
        padding: 16px 14px;
        border-bottom: 1px solid var(--nx-line);
      }

      .hero.published {
        background: var(--nx-panel);
        border-left: 2px solid var(--nx-signal);
      }

      .hero.missing {
        background: var(--nx-panel);
        border-left: 2px solid var(--nx-med);
      }

      .hero.idle {
        background: var(--nx-panel);
        border-left: 2px solid var(--nx-line);
      }

      .eyebrow {
        display: block;
        margin-bottom: 8px;
        font-family: var(--nx-mono);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--nx-ink-faint);
      }

      h2 {
        margin: 0 0 10px;
        font-size: 18px;
        font-weight: 700;
        line-height: 1.2;
        color: var(--nx-ink);
      }

      h3 {
        margin: 0 0 10px;
        font-family: var(--nx-mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--nx-ink);
        padding-bottom: 8px;
        border-bottom: 1px solid var(--nx-line);
      }

      p,
      li,
      dd,
      dt {
        font-size: 12.5px;
        line-height: 1.55;
        color: var(--nx-ink-dim);
      }

      ol {
        margin: 0;
        padding-left: 18px;
      }

      dl {
        display: grid;
        grid-template-columns: 78px 1fr;
        gap: 6px 10px;
        margin: 0;
      }

      dt {
        font-family: var(--nx-mono);
        font-size: 10px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--nx-ink-faint);
      }

      dd {
        margin: 0;
        color: var(--nx-ink);
      }

      .break {
        overflow-wrap: anywhere;
      }

      button {
        width: 100%;
        border: 1px solid var(--nx-signal);
        padding: 9px 12px;
        background: var(--nx-signal);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-family: var(--nx-mono);
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: 0.15s;
      }

      button:hover:not(:disabled) {
        background: #5142e0;
        border-color: #5142e0;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      button.secondary {
        background: transparent;
        color: var(--nx-ink-dim);
        border: 1px solid var(--nx-line);
      }

      button.secondary:hover:not(:disabled) {
        border-color: var(--nx-signal-dim);
        color: var(--nx-ink);
        background: transparent;
      }

      button.ghost {
        background: transparent;
        color: var(--nx-ink-dim);
        border: none;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      button.ghost:hover:not(:disabled) {
        color: var(--nx-ink);
        background: transparent;
      }

      button.small {
        width: auto;
        padding: 6px 9px;
        font-size: 10px;
      }

      .actions,
      .button-row {
        display: grid;
        gap: 8px;
      }

      .button-row {
        grid-template-columns: 1fr 1fr;
      }

      #auth {
        padding: 12px 14px;
        border-bottom: 1px solid var(--nx-line);
        background: var(--nx-panel);
      }

      .auth-form {
        display: grid;
        gap: 8px;
      }

      .auth-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
        color: var(--nx-ink-dim);
      }

      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid var(--nx-line);
        padding: 9px 10px;
        background: var(--nx-code-bg);
        color: var(--nx-ink);
        font: inherit;
        font-size: 12.5px;
        outline: none;
      }

      input:focus {
        border-color: var(--nx-signal-dim);
      }

      pre {
        max-height: 220px;
        overflow: auto;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        background: var(--nx-code-bg);
        color: #cdd6df;
        border: 1px solid var(--nx-line);
        padding: 10px 12px;
        font-family: var(--nx-mono);
        font-size: 11.5px;
        line-height: 1.55;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .chips span,
      .difficulty {
        display: inline-flex;
        border: 1px solid var(--nx-line);
        padding: 3px 8px;
        background: transparent;
        font-family: var(--nx-mono);
        font-size: 10.5px;
        letter-spacing: 0.03em;
        color: var(--nx-ink-dim);
      }

      .difficulty.easy {
        color: var(--nx-easy);
        border-color: var(--nx-easy);
      }

      .difficulty.medium {
        color: var(--nx-med);
        border-color: var(--nx-med);
      }

      .difficulty.hard {
        color: var(--nx-hard);
        border-color: var(--nx-hard);
      }

      .code-panel {
        margin-bottom: 8px;
      }

      .code-panel summary {
        cursor: pointer;
        font-family: var(--nx-mono);
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--nx-ink-dim);
      }

      .muted {
        color: var(--nx-ink-faint);
      }

      .error {
        border-left: 2px solid var(--nx-hard);
        padding: 8px 10px;
        background: var(--nx-panel);
        color: var(--nx-hard);
        font-size: 12.5px;
      }

      .message {
        border-left: 2px solid var(--nx-signal);
        padding: 8px 10px;
        background: var(--nx-panel);
        color: var(--nx-ink-dim);
        font-size: 12.5px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <h1>NexAlgo</h1>
        <p class="muted" id="status">Waiting for a supported problem page.</p>
      </header>
      <div id="auth"></div>
      <main class="panel">
        <div id="content"></div>
        <div class="actions">
          <button type="button" id="open-web">Open NexAlgo</button>
          <button type="button" class="secondary" id="refresh">Refresh</button>
        </div>
      </main>
    </div>
    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
