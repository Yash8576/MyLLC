<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexAlgo</title>
    <style>
      body {
        margin: 0;
        font-family:
          "Sora",
          "Aptos",
          "Segoe UI",
          sans-serif;
        background: #f6faff;
        color: #222c44;
      }

      .shell {
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(101, 86, 255, 0.1), transparent 38%),
          linear-gradient(180deg, #ffffff 0%, #f6faff 60%, #ffffff 100%);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 1;
        padding: 16px 18px;
        border-bottom: 1px solid rgba(101, 86, 255, 0.12);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(18px);
        box-shadow: 0 12px 24px rgba(101, 86, 255, 0.08);
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      #status {
        margin: 6px 0 0;
        font-size: 12px;
        color: rgba(101, 86, 255, 0.84);
      }

      .panel {
        padding: 16px;
      }

      section {
        margin: 0 0 18px;
      }

      #content > section:not(.hero) {
        border: 1px solid rgba(101, 86, 255, 0.1);
        border-radius: 16px;
        padding: 12px;
        background: #ffffff;
        box-shadow: 0 12px 24px rgba(101, 86, 255, 0.08);
      }

      .hero {
        margin: -16px -16px 16px;
        padding: 18px 16px;
        border-bottom: 1px solid rgba(101, 86, 255, 0.12);
      }

      .hero.published {
        background: linear-gradient(135deg, #6556ff, #2c2669);
        color: #ffffff;
      }

      .hero.missing {
        background: linear-gradient(135deg, #4c47b8, #1f2346);
        color: #ffffff;
      }

      .hero.idle {
        background: linear-gradient(135deg, #222c44, #1a2040);
        color: #ffffff;
      }

      .eyebrow {
        display: block;
        margin-bottom: 8px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0.78;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 22px;
        line-height: 1.15;
      }

      h3 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      p,
      li,
      dd,
      dt {
        font-size: 13px;
        line-height: 1.48;
      }

      ol {
        margin: 0;
        padding-left: 20px;
      }

      dl {
        display: grid;
        grid-template-columns: 86px 1fr;
        gap: 6px 10px;
        margin: 0;
      }

      dt {
        color: rgba(34, 44, 68, 0.64);
        font-weight: 700;
      }

      dd {
        margin: 0;
      }

      .break {
        overflow-wrap: anywhere;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 10px 12px;
        background: #6556ff;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        box-shadow: 0 10px 22px rgba(101, 86, 255, 0.18);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          background 0.2s ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 14px 26px rgba(101, 86, 255, 0.22);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.54;
      }

      button.secondary {
        background: linear-gradient(180deg, #ffffff 0%, #eef3ff 100%);
        color: #6556ff;
        border: 1px solid rgba(101, 86, 255, 0.2);
        box-shadow: 0 10px 22px rgba(101, 86, 255, 0.12);
      }

      button.ghost {
        background: transparent;
        color: #6556ff;
        border: 1px solid rgba(101, 86, 255, 0.2);
        box-shadow: none;
      }

      button.small {
        width: auto;
        padding: 6px 9px;
        font-size: 12px;
      }

      .actions,
      .button-row {
        display: grid;
        gap: 8px;
      }

      .button-row {
        grid-template-columns: 1fr 1fr;
      }

      #auth {
        padding: 12px 16px;
        border-bottom: 1px solid rgba(101, 86, 255, 0.12);
        background: rgba(255, 255, 255, 0.7);
      }

      .auth-form {
        display: grid;
        gap: 8px;
      }

      .auth-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid rgba(101, 86, 255, 0.2);
        border-radius: 12px;
        padding: 10px;
        background: #f6faff;
        color: #222c44;
        font: inherit;
      }

      pre {
        max-height: 220px;
        overflow: auto;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        background: #1a2040;
        color: #f6faff;
        border-radius: 12px;
        padding: 10px;
        font-size: 12px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .chips span,
      .difficulty {
        display: inline-flex;
        border: 1px solid rgba(101, 86, 255, 0.14);
        border-radius: 999px;
        padding: 5px 8px;
        background: rgba(255, 255, 255, 0.88);
        font-size: 12px;
        color: #6556ff;
      }

      .difficulty.easy {
        background: rgba(22, 128, 60, 0.12);
        color: #16803c;
      }

      .difficulty.medium {
        background: rgba(217, 119, 6, 0.15);
        color: #d97706;
      }

      .difficulty.hard {
        background: rgba(197, 48, 48, 0.14);
        color: #c53030;
      }

      .code-panel {
        margin-bottom: 8px;
      }

      .code-panel summary {
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
      }

      .muted {
        color: rgba(34, 44, 68, 0.68);
      }

      .error {
        border-left: 3px solid #c53030;
        padding: 8px 10px;
        background: rgba(197, 48, 48, 0.1);
        color: #c53030;
        border-radius: 10px;
      }

      .message {
        border-left: 3px solid #6556ff;
        padding: 8px 10px;
        background: rgba(101, 86, 255, 0.12);
        color: #4c47b8;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <h1>NexAlgo</h1>
        <p class="muted" id="status">Waiting for a supported problem page.</p>
      </header>
      <div id="auth"></div>
      <main class="panel">
        <div id="content"></div>
        <div class="actions">
          <button type="button" id="open-web">Open NexAlgo</button>
          <button type="button" class="secondary" id="refresh">Refresh</button>
        </div>
      </main>
    </div>
    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
